# Per-strategy parameters
# Loaded at runtime by config/settings.py and each strategy module.

sum_to_one_arb:
  enabled: true
  min_arb_gap: 0.02          # Minimum YES+NO discount to enter (e.g. 0.02 = 2¢)
  max_position_usd: 200.0
  kelly_fraction: 0.25

market_maker:
  enabled: false
  spread_target: 0.02        # Target bid-ask spread to capture
  max_inventory_usd: 100.0
  rebalance_interval_sec: 60
  kelly_fraction: 0.10

value_betting:
  enabled: false
  min_edge: 0.05             # Only enter if |LLM_prob - market_price| > 5%
  min_confidence: 0.70       # LLM confidence threshold
  max_position_usd: 50.0
  kelly_fraction: 0.15
  llm_model: claude-sonnet-4-6

momentum:
  enabled: false
  lookback_hours: 24
  entry_threshold: 0.03      # Min price change over lookback to enter
  max_position_usd: 75.0
  kelly_fraction: 0.20

weather_betting:
  enabled: false
  cities:
    - name: "New York"
      lat: 40.7812
      lon: -73.9665
      polymarket_station: "NYC"
    - name: "Chicago"
      lat: 41.8827
      lon: -87.6233
      polymarket_station: "Chicago"
    - name: "Miami"
      lat: 25.7617
      lon: -80.1918
      polymarket_station: "Miami"
  forecast_source: "open_meteo"     # free, no API key required
  forecast_horizon_days: 1          # D+1 only (resolves in 24h)
  sigma_celsius: 1.5                # forecast uncertainty in °C (v1: fixed)
  monte_carlo_samples: 50000        # samples for P(bucket) calculation
  min_volume_usd: 10000             # standard risk_manager rule
  max_hours_to_close: 48            # only markets resolving within 48h
  min_edge_pct: 5.0                 # min edge % to enter (model_prob - market_price)
  max_buckets_per_market: 4         # max legs per market ladder
  min_bucket_price: 0.01            # skip buckets below 1¢ (no liquidity)
  max_bucket_price: 0.60            # skip buckets above 60¢ (edge compressed)
  kelly_fraction: 0.25              # fractional Kelly (standard project default)
  max_position_size_usd: 25.0       # conservative cap per leg (v1)
